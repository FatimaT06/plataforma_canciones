name: frontend_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"  # Cambiado para mejor compatibilidad

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  
  # Networking
  http: ^1.1.0
  dio: ^5.3.3
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Audio
  audioplayers: ^5.2.1
  
  # State management
  provider: ^6.0.5
  
  # Image and file - Versión actualizada
  file_picker: ^8.0.0  # Actualizada para mejor compatibilidad
  
  # Local storage
  sqflite: ^2.3.0
  
  # JWT token
  jwt_decoder: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/music/  # Agregado también para música